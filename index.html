<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Apps Directory</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0066cc">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .card img {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .card a {
      font-size: 1.1rem;
      color: #0066cc;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <h1>Travel Apps</h1>
  <div class="grid" id="app-grid"></div>

  <script>
    async function loadApps() {
      const grid = document.getElementById("app-grid");

      const dirs = await fetch("apps.json").then(r => r.json());

      for (const dir of dirs) {
        const manifestUrl = `${dir}/manifest.json`;

        try {
          const manifestResp = await fetch(manifestUrl);
          if (!manifestResp.ok) continue;

          const manifest = await manifestResp.json();
          const icon = manifest.icons?.[0]?.src || null;

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${dir}/${icon}" alt="${manifest.name}">
            <a href="${dir}/">${manifest.name}</a>
          `;

          grid.appendChild(card);
        } catch (e) {
          console.log("No manifest in", dir);
        }
      }
    }

    loadApps();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
